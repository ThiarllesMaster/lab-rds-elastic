spring:
  application:
    name: lab-rds
  cloud:
    aws:
      region:
        static: eu-west-1
  logging:
    level:
      io.awspring.cloud: DEBUG
      org.springframework.boot.context.config: DEBUG

  config:
    import:
      - aws-parameterstore:/lab-rds/
      - aws-secretsmanager:lab-rds/database

  datasource:
    url: ${db.url}
    username: ${db.user}
    password: ${db.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  data:
    redis:
      host: ${db.elastic_cache}
      port: 6379
      ssl:
        enabled: true